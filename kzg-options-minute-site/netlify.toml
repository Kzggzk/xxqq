[build]
  publish = "dist"
  command = ""

[[redirects]]
  from = "/data/*"
  to = "/"
  status = 404

[[redirects]]
  from = "/reports/*"
  to = "/"
  status = 404

[[redirects]]
  from = "/assets/kzg-pack.js"
  to = "/"
  status = 404

[[redirects]]
  from = "/r/:date"
  to = "/r/report-:date.html"
  status = 200

[[redirects]]
  from = "/latest"
  to = "/r/latest.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-Robots-Tag = "noindex, noarchive, nosnippet"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'"
